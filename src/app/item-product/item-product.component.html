<article class="group relative flex flex-col bg-white rounded-2xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-pointer w-full">

  <!-- Image Container -->
  <div class="relative bg-[#f5f5f7] rounded-2xl mx-2 mt-2 overflow-hidden aspect-square flex items-center justify-center">

    <!-- Badge -->
    <!-- @if (product.badge) {
      <span class="absolute top-3 left-3 z-10 bg-gray-900 text-white text-[10px] font-semibold px-2 py-1 rounded-full uppercase tracking-wide">
        {{ product.badge }}
      </span>
    } -->

    <!-- Discount Badge -->
    <!-- @if (discount) {
      <span class="absolute top-3 left-3 z-10 bg-red-500 text-white text-[10px] font-semibold px-2 py-1 rounded-full">
        -{{ discount }}%
      </span>
    } -->

    <!-- Favorite Button -->
    <button
      (click)="toggleFavorite($event)"
      class="absolute top-3 right-3 z-10 flex items-center justify-center w-8 h-8 rounded-full bg-white shadow-sm transition-all duration-200 hover:scale-110 active:scale-90"
      [class.text-red-500]="isFavorite"
      [class.text-gray-400]="!isFavorite"
      aria-label="Toggle favorite"
    >
      <svg
        width="16" height="16" viewBox="0 0 24 24"
        [attr.fill]="isFavorite ? 'currentColor' : 'none'"
        stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"
      >
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
    </button>

    <!-- Product Image -->
    <img
      [src]="product.imageUrl"
      [alt]="product.description"
      class="w-4/5 h-4/5 object-contain transition-transform duration-500 group-hover:scale-105"
    />
  </div>

  <!-- Content -->
  <div class="flex flex-col gap-2 px-3 py-3">

    <!-- Name -->
    <h3 class="text-sm font-semibold text-gray-900 leading-snug line-clamp-2">
      {{ product.brand }}
    </h3>

    <!-- Description -->
    @if (product.description) {
      <p class="text-xs text-gray-400 leading-snug line-clamp-1">
        {{ product.description }}
      </p>
    }

    <!-- Price Row -->
    <div class="flex items-center gap-2 mt-0.5">
      <span class="text-base font-black text-gray-900">
        £{{ product.price.toLocaleString() }}
      </span>
      @if (product.price) {
        <span class="text-sm text-gray-400 line-through font-normal">
          £{{ product.price.toLocaleString() }}
        </span>
      }
    </div>

    <!-- Add to Cart -->
    <button
      (click)="addToCart($event)"
      class="mt-1 w-full py-2 rounded-full bg-gray-900 text-white text-xs font-semibold
             opacity-0 translate-y-1 group-hover:opacity-100 group-hover:translate-y-0
             transition-all duration-200 hover:bg-gray-700 active:scale-95"
    >
      Add to cart
    </button>

  </div>
</article>
