<article
  (click)="cardOnClick()"
  class="group relative flex flex-col bg-white rounded-xl sm:rounded-2xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-pointer w-full h-full">

  <!-- Image Container -->
  <div
    class="relative bg-[#f5f5f7] rounded-lg sm:rounded-2xl mx-2 sm:mx-2 mt-2 sm:mt-2 overflow-hidden aspect-square flex items-center justify-center">

    <!-- Badge -->
    <!-- @if (product.badge) {
      <span class="absolute top-3 left-3 z-10 bg-gray-900 text-white text-[10px] font-semibold px-2 py-1 rounded-full uppercase tracking-wide">
        {{ product.badge }}
      </span>
    } -->

    <!-- Discount Badge -->
    <!-- @if (discount) {
      <span class="absolute top-3 left-3 z-10 bg-red-500 text-white text-[10px] font-semibold px-2 py-1 rounded-full">
        -{{ discount }}%
      </span>
    } -->

    <!-- Product Image -->
    <img [src]="product.imageUrl | safeImageUrl" [alt]="product.description"
      class="w-4/5 h-4/5 object-contain transition-transform duration-500 group-hover:scale-105" />
  </div>

  <!-- Content -->
  <div class="flex flex-col gap-2 sm:gap-3 px-3 sm:px-4 py-3 sm:py-4 flex-grow">

    <!-- Name -->
    <h3 class="text-xs sm:text-sm font-semibold text-gray-900 leading-snug line-clamp-2">
      {{ product.brand }}
    </h3>

    @if (product.model) {
      <p class="text-sm sm:text-base font-semibold text-gray-700 line-clamp-1">{{ product.model }}</p>
    }

    @if (product.description) {
      <p class="text-xs text-gray-500 leading-snug line-clamp-2">
        {{ product.description }}
      </p>
    }

    <!-- Price Row -->
    <div class="mt-1 flex items-baseline gap-2 sm:mt-2">
      <span class="text-sm font-black text-gray-900 sm:text-base">
        {{ product.price.toLocaleString('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 0 }) }}
      </span>
    </div>

    <!-- Add to Cart -->
    <button (click)="addToCart($event)"
      class="mt-3 w-full py-2 rounded-full bg-gray-900 text-white text-sm font-semibold transition-all duration-200 hover:bg-gray-700 active:scale-95">
      Agregar al carrito
    </button>

  </div>
</article>
