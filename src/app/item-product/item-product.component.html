<article
(onclick)="cardOnClick()"
  class="group relative flex flex-col bg-white rounded-2xl overflow-hidden transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-pointer w-full">

  <!-- Image Container -->
  <div
    class="relative bg-[#f5f5f7] rounded-2xl mx-2 mt-2 overflow-hidden aspect-square flex items-center justify-center">

    <!-- Badge -->
    <!-- @if (product.badge) {
      <span class="absolute top-3 left-3 z-10 bg-gray-900 text-white text-[10px] font-semibold px-2 py-1 rounded-full uppercase tracking-wide">
        {{ product.badge }}
      </span>
    } -->

    <!-- Discount Badge -->
    <!-- @if (discount) {
      <span class="absolute top-3 left-3 z-10 bg-red-500 text-white text-[10px] font-semibold px-2 py-1 rounded-full">
        -{{ discount }}%
      </span>
    } -->



    <!-- Product Image -->
    <img [src]="product.imageUrl" [alt]="product.description"
      class="w-4/5 h-4/5 object-contain transition-transform duration-500 group-hover:scale-105" />
  </div>

  <!-- Content -->
  <div class="flex flex-col gap-2 px-3 py-3">

    <!-- Name -->
    <h3 class="text-sm font-semibold text-gray-900 leading-snug line-clamp-2">
      {{ product.brand }}
    </h3>

    <!-- Description -->
    @if (product.description) {
    <p class="text-xs text-gray-400 leading-snug line-clamp-1">
      {{ product.description }}
    </p>
    }

    <!-- Price Row -->
    <div class="flex items-center gap-2 mt-0.5">
      <span class="text-base font-black text-gray-900">
        {{ product.price.toLocaleString() }} MXN
      </span>
      @if (product.price) {
      <span class="text-sm text-gray-400 line-through font-normal">
        {{ product.price.toLocaleString() }} MXN
      </span>
      }
    </div>

    <!-- Add to Cart -->
    <button (click)="addToCart($event)" class="mt-1 w-full py-2 rounded-full bg-gray-900 text-white text-xs font-semibold
             opacity-0 translate-y-1 group-hover:opacity-100 group-hover:translate-y-0
             transition-all duration-200 hover:bg-gray-700 active:scale-95 pointer-events-auto">
      Add to cart
    </button>

  </div>
</article>
