<header class="topbar-wrapper">
  <nav class="topbar-inner">

    <!-- Logo -->
    <a href="/" class="topbar-logo" aria-label="Nitec Home">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
        <path d="M3 3L21 21M3 21L12 3L21 21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      <span class="logo-text">nitec.</span>
    </a>

    <!-- Search Bar -->
    <div class="search-container">
      <input type="text" placeholder="Search products..." class="search-input" aria-label="Search products" />
      <button class="search-btn" aria-label="Search">
        <!-- Search Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
    </div>

    <!-- Action Buttons -->
    <div class="topbar-actions">

      <!-- Cart Button -->
      <lucide-icon [name]="shoppingCartIcon"
        class="text-indigo-600 size-6 hover:text-indigo-800 transition-colors cursor-pointer">
      </lucide-icon>

      <!-- WhatsApp Button -->
      <button (click)="openWhatsApp()" class="action-btn whatsapp-btn" aria-label="Contact via WhatsApp">
        <!-- WhatsApp Icon -->
        <lucide-icon [name]="messageCircleIcon"
          class="text-slate-50 size-6 hover:text-secondary transition-colors cursor-pointer">
        </lucide-icon>
      </button>

    </div>
  </nav>
</header>
