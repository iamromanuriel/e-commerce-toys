<footer class="w-full bg-gray-50 border-t border-gray-200 px-8 py-10 dark:bg-gray-900 dark:border-gray-800">
  <div class="max-w-5xl mx-auto flex flex-col items-center gap-5">


    <!-- Credit -->
    <p class="text-sm text-gray-500 text-center leading-relaxed m-0 dark:text-gray-400">
      Diseñado y desarrollado por
      <a
        [href]="websiteUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="text-gray-900 font-medium no-underline border-b border-gray-400 pb-px transition-colors duration-200 hover:border-gray-900 dark:text-gray-100 dark:border-gray-600 dark:hover:border-gray-100"
      >
        Roman Uriel
      </a>
    </p>

    <!-- Bottom bar -->
    <div class="flex items-center gap-2 font-mono text-xs text-gray-400 tracking-wide dark:text-gray-600">
      <span>© {{ currentYear }}</span>
      <span class="w-1 h-1 rounded-full bg-gray-300 dark:bg-gray-700 inline-block"></span>
      <span>Todos los derechos reservados</span>
    </div>

  </div>
</footer>
