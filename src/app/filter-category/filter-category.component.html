
<div class="flex flex-col gap-3 items-center">
  <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-widest">
    Filter by Category
  </h2>
  <div class="flex flex-wrap gap-2">
    <button
      *ngFor="let category of categorys"
      (click)="selectCategory(category.id)"
      [class]="selectedCategory === category.id
        ? 'px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 bg-gray-900 text-white shadow-sm'
        : 'px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 bg-white text-gray-600 border border-gray-200 hover:border-gray-400 hover:text-gray-900'"
    >
      {{ category.name }}
    </button>
  </div>
</div>
