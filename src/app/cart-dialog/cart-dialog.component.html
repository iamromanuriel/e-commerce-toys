<div class="dialog-backdrop fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" 
     (click)="onBackdropClick($event)">
  
  <section
    class="flex max-h-[min(90vh,720px)] w-full max-w-2xl flex-col overflow-hidden rounded-2xl bg-white shadow-2xl sm:rounded-[2rem]"
  >
    <!-- Header -->
    <div class="flex items-start justify-between gap-4 border-b border-gray-200 bg-slate-50 p-5">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Carrito de compras</p>
        <h2 class="mt-2 text-2xl font-semibold text-slate-900">Tus productos</h2>
      </div>
      <button class="rounded-full border border-slate-200 bg-white p-3 text-slate-600 hover:bg-slate-100"
              (click)="closeDialog()" aria-label="Cerrar">
        <lucide-icon [name]="xIcon" class="w-5 h-5"></lucide-icon>
      </button>
    </div>

    <!-- Contenido principal -->
    <div class="max-h-[min(50vh,22rem)] overflow-y-auto p-4 sm:max-h-96 sm:p-6">
      <ng-container *ngIf="cartItemsWithProducts$ | async as items">
        <!-- Carrito vacío -->
        <div *ngIf="items.length === 0" class="text-center py-8">
          <p class="text-slate-500">Tu carrito está vacío</p>
        </div>

        <!-- Lista de productos -->
        <div
          *ngFor="let item of items"
          class="flex flex-col gap-3 border-b border-gray-100 py-4 last:border-b-0 sm:flex-row sm:items-center"
        >
          <img
            [src]="item.product.imageUrl | safeImageUrl"
               [alt]="item.product.description" 
               class="mx-auto h-20 w-20 flex-shrink-0 rounded-lg bg-slate-50 object-contain sm:mx-0" />

          <div class="min-w-0 flex-1 text-center sm:text-left">
            <h3 class="font-semibold text-slate-900">{{ item.product.brand }} {{ item.product.model }}</h3>
            <p class="text-sm text-slate-500">{{ item.product.price }} MXN c/u</p>
            <div class="mt-2 flex items-center justify-center gap-2 sm:justify-start">
              <button class="rounded border border-slate-200 px-2 py-1 text-sm" 
                      (click)="updateQuantity(item.productId, item.quantity - 1)">-</button>
              <span class="px-2">{{ item.quantity }}</span>
              <button class="rounded border border-slate-200 px-2 py-1 text-sm" 
                      (click)="updateQuantity(item.productId, item.quantity + 1)">+</button>
            </div>
          </div>

          <div class="text-center sm:text-right">
            <p class="font-semibold text-slate-900">{{ item.product.price * item.quantity }} MXN</p>
            <button class="text-red-500 hover:text-red-700 mt-2" (click)="removeItem(item.productId)">
              <lucide-icon [name]="trashIcon" class="w-4 h-4"></lucide-icon>
            </button>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Footer con botón de compra -->
    <ng-container *ngIf="cartItemsWithProducts$ | async as items">
      <div *ngIf="items.length > 0" class="border-t border-gray-200 bg-slate-50 px-6 py-5">
        <div class="flex items-center justify-between mb-4">
          <span class="text-lg font-semibold text-slate-900">Total: {{ total$ | async }} MXN</span>
        </div>
        <button class="w-full rounded-full bg-green-600 px-6 py-3 text-sm font-semibold text-white hover:bg-green-700" 
                (click)="finalizePurchase()">
          Finalizar compra
        </button>
      </div>
    </ng-container>
  </section>
</div>
